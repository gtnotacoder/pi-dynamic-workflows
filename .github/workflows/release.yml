name: Release

# Publishing is driven by version tags. To cut a release:
#   1. Bump "version" in package.json (e.g. 1.1.0) and commit on main.
#   2. git tag v1.1.0 && git push origin v1.1.0
# The tag must match the package.json version, or the publish job fails fast.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # npm provenance (OIDC)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint, build, and test
        run: npm test

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest
      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: npm run build

      # Auth is via OIDC trusted publishing — no NODE_AUTH_TOKEN needed.
      # Trusted publisher: npmjs.com -> pi-dynamic-workflows-oc-style -> Settings
      #   (org/user: gtnotacoder, repo: pi-dynamic-workflows, workflow: release.yml)
      - name: Publish to npm (Trusted Publishing via OIDC)
        run: npm publish --provenance --access public

  github-release:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
